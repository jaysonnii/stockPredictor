<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Predictor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js">
  // ── Watchlist ──────────────────────────────────────────────────────────────
  function loadWatchlist() {
    try { return JSON.parse(localStorage.getItem('watchlist') || '[]'); }
    catch { return []; }
  }

  function saveWatchlist(list) {
    localStorage.setItem('watchlist', JSON.stringify(list));
  }

  function renderWatchlist() {
    const list = loadWatchlist();
    const el = document.getElementById('wlList');
    if (list.length === 0) {
      el.innerHTML = '<div class="wl-empty">No stocks added yet.</div>';
      return;
    }
    el.innerHTML = list.map((s, i) => `
      <div class="wl-item" onclick="quickLook('${s.ticker}')">
        <button class="wl-remove" onclick="event.stopPropagation(); removeFromWatchlist(${i})">✕</button>
        <div class="wl-ticker">${s.ticker}</div>
        <div class="wl-name">${s.name}</div>
        <div class="wl-price">${s.price}</div>
        <div class="wl-date">Added ${s.date}</div>
      </div>
    `).join('');
  }

  function addToWatchlist() {
    const ticker = curTicker;
    const name = document.getElementById('sName').textContent;
    const price = document.getElementById('sPrice').textContent;
    const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    const list = loadWatchlist();
    if (list.find(s => s.ticker === ticker)) {
      alert(ticker + ' is already in your watchlist.');
      return;
    }
    list.push({ ticker, name, price, date });
    saveWatchlist(list);
    renderWatchlist();
    document.getElementById('addWatchBtn').textContent = '✓ Added';
    document.getElementById('addWatchBtn').disabled = true;
  }

  function removeFromWatchlist(index) {
    const list = loadWatchlist();
    list.splice(index, 1);
    saveWatchlist(list);
    renderWatchlist();
  }

  // Show add button after results load
  const origRun = run;

  // Render watchlist on page load
  renderWatchlist();

</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    color: #111;
    font-family: system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    padding: 32px 20px 80px;
  }

  .layout { display: flex; gap: 32px; max-width: 1080px; margin: 0 auto; }
  .main { flex: 1; min-width: 0; }
  .wrap { width: 100%; }

  h1 {
    font-family: monospace;
    font-size: 13px;
    font-weight: 400;
    color: #999;
    margin-bottom: 24px;
  }

  .search { display: flex; gap: 8px; margin-bottom: 36px; }

  input {
    font-family: monospace;
    font-size: 20px;
    font-weight: 600;

    background: #fff;
    border: 1px solid #ccc;

    padding: 10px 14px;

  }

  input:focus { border-color: #111; }

  button {

    font-size: 14px;

  }

  .result { display: none; }
  .result.show { display: block; }

  /* Stock header */
  .stock-header {
    padding-bottom: 20px;
    margin-bottom: 24px;
    border-bottom: 1px solid #ddd;
  }

  .stock-name {
    font-size: 20px;
    font-weight: 600;
  }

  .stock-sub {
    font-family: monospace;
    font-size: 12px;
    color: #888;

  }

  /* Company info */
  .info-row {
    display: flex;

  }

    font-family: monospace;
    font-size: 14px;
    font-weight: 500;

  }

  /* Chart */
  .chart-top {
    display: flex;
    align-items: center;
    justify-content: space-between;

  .tabs { display: flex; gap: 4px; }

  .tab {
    font-family: monospace;
    font-size: 11px;
    background: transparent;
    color: #888;
    border: 1px solid #ccc;
    border-radius: 0;
    padding: 3px 8px;
    cursor: pointer;
  }

  .tab:hover { color: #111; border-color: #888; }
  .tab.active { background: #111; color: #fff; border-color: #111; }

  .chart-box {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 0;
    padding: 16px;
    height: 220px;
    position: relative;
  }

  .note {
    font-size: 12px;
    color: #bbb;
    margin-top: 32px;
  }

  .popular { margin-bottom: 32px; }
  .popular-label { font-family: monospace; font-size: 11px; color: #999; margin-bottom: 10px; }
  .popular-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .pop-btn {
    font-family: monospace;
    font-size: 13px;
    background: #fff;
    color: #111;
    border: 1px solid #ccc;
    padding: 6px 12px;
    cursor: pointer;
  }
  .pop-btn:hover { border-color: #111; }

  /* Watchlist sidebar */
  .watchlist {
    width: 220px;
    flex-shrink: 0;
    position: sticky;
    top: 32px;
    align-self: flex-start;
  }

  .wl-header {
    font-family: monospace;
    font-size: 11px;
    color: #999;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .wl-header span { color: #bbb; font-size: 10px; cursor: default; }

  .wl-empty {
    font-family: monospace;
    font-size: 12px;
    color: #ccc;
    padding: 10px 0;
  }

  .wl-item {
    border: 1px solid #eee;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }

  .wl-item:hover { border-color: #aaa; }

  .wl-ticker {
    font-family: monospace;
    font-size: 14px;
    font-weight: 600;
    color: #111;
  }

  .wl-name {
    font-size: 11px;
    color: #888;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .wl-price {
    font-family: monospace;
    font-size: 13px;
    color: #111;
    margin-top: 4px;
  }

  .wl-date {
    font-family: monospace;
    font-size: 10px;
    color: #bbb;
    margin-top: 2px;
  }

  .wl-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 11px;
    color: #ccc;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }

  .wl-remove:hover { color: #c00; }

  .add-watch-btn {
    font-family: monospace;
    font-size: 12px;
    background: #fff;
    color: #111;
    border: 1px solid #ccc;
    padding: 7px 14px;
    cursor: pointer;
    margin-top: 4px;
    margin-bottom: 28px;
    display: none;
  }

  .add-watch-btn:hover { border-color: #111; }
  .add-watch-btn.visible { display: inline-block; }

  @media (max-width: 780px) {
    .layout { flex-direction: column; }
    .watchlist { width: 100%; position: static; }
  }

  /* Tooltip */
  .tip {
    position: relative;
    display: inline-block;
    border-bottom: 1px dashed #aaa;
    cursor: help;
  }
  .tip .tiptext {
    display: none;
    position: absolute;
    bottom: 130%;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: #eee;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.5;
    padding: 8px 10px;
    width: 220px;
    z-index: 99;
    pointer-events: none;
  }
  .tip:hover .tiptext { display: block; }

  /* Signal card */
  .signal-card {
    border: 1px solid #ddd;
    padding: 14px 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .signal-badge {
    font-family: monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 12px;
    border: 1px solid;
    letter-spacing: 0.05em;
  }
  .signal-badge.buy  { color: #1a7f37; border-color: #1a7f37; }
  .signal-badge.hold { color: #b08000; border-color: #b08000; }
  .signal-badge.sell { color: #c00;    border-color: #c00; }
  .signal-reason {
    font-size: 12px;
    color: #666;
    line-height: 1.5;
  }

  /* ETF section */
  .etf-section { margin-bottom: 24px; }
  .etf-label {
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;

</style>

<body>
<div class="layout"><div class="main"><div class="wrap">

  <h1>stock predictor &mdash; ml price forecast</h1>

  <div class="search">
    <input id="ticker" type="text" placeholder="AAPL" maxlength="6" />
    <button id="btn" onclick="run()">Look up</button>
  </div>


  <div class="popular">
    <div class="popular-label">popular stocks</div>
    <div class="popular-grid">
      <button class="pop-btn" onclick="quickLook('AAPL')">AAPL — Apple</button>
      <button class="pop-btn" onclick="quickLook('MSFT')">MSFT — Microsoft</button>
      <button class="pop-btn" onclick="quickLook('GOOGL')">GOOGL — Alphabet</button>
      <button class="pop-btn" onclick="quickLook('AMZN')">AMZN — Amazon</button>
      <button class="pop-btn" onclick="quickLook('NVDA')">NVDA — Nvidia</button>
      <button class="pop-btn" onclick="quickLook('TSLA')">TSLA — Tesla</button>
      <button class="pop-btn" onclick="quickLook('META')">META — Meta</button>
      <button class="pop-btn" onclick="quickLook('JPM')">JPM — JPMorgan</button>
      <button class="pop-btn" onclick="quickLook('SPY')">SPY — S&P 500 ETF</button>
      <button class="pop-btn" onclick="quickLook('BRK-B')">BRK-B — Berkshire</button>
    </div>
  </div>

  <div class="error" id="error"></div>
  <div class="loading" id="loading"><span id="loadingMsg">Fetching data...</span></div>

  <div class="result" id="result">

    <div class="stock-header">
      <div class="stock-name" id="sName"></div>
      <div class="stock-sub" id="sSub"></div>
      <div class="stock-price" id="sPrice"></div>
    </div>

    <button class="add-watch-btn" id="addWatchBtn" onclick="addToWatchlist()">+ Add to Watchlist</button>

    <!-- Signal card -->
    <div class="signal-card" id="signalCard" style="display:none;">
      <div class="signal-badge" id="signalBadge"></div>
      <div class="signal-reason" id="signalReason"></div>
    </div>

    <div id="predRows" style="margin-bottom:28px;"></div>

    <!-- ETF section -->
    <div class="etf-section" id="etfSection" style="display:none;">
      <div class="etf-label">related etfs that hold this stock</div>
      <div class="etf-chips" id="etfChips"></div>
    </div>

    <div class="info-row" id="infoRow"></div>

    <div class="chart-top">
      <div class="chart-lbl">Price History</div>
      <div class="tabs">
        <button class="tab" onclick="loadChart('1mo')">1M</button>
        <button class="tab" onclick="loadChart('3mo')">3M</button>
        <button class="tab active" onclick="loadChart('1y')">1Y</button>
        <button class="tab" onclick="loadChart('2y')">2Y</button>
        <button class="tab" onclick="loadChart('5y')">5Y</button>
      </div>
    </div>
    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>

    <div class="note">Predictions are for educational purposes only. Not financial advice.</div>
  </div>

</div><!-- end .wrap -->
</div><!-- end .main -->

<!-- Watchlist sidebar -->
<div class="watchlist">
  <div class="wl-header">watchlist <span>saved locally</span></div>
  <div id="wlList"><div class="wl-empty">No stocks added yet.</div></div>
</div>

</div><!-- end .layout -->
<script>
  let chartInst = null;
  let curTicker = '';

  document.getElementById('ticker').addEventListener('keydown', e => {
    if (e.key === 'Enter') run();
  });


  function quickLook(ticker) {
    document.getElementById('ticker').value = ticker;
    run();
  }

  function fmt(n) {
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtMcap(n) {
    if (!n) return 'N/A';
    if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return '$' + (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6)  return '$' + (n/1e6).toFixed(2) + 'M';
    return '$' + n.toLocaleString();
  }

  async function run() {
    const ticker = document.getElementById('ticker').value.trim().toUpperCase();
    if (!ticker) return;
    curTicker = ticker;

    document.getElementById('error').classList.remove('show');
    document.getElementById('result').classList.remove('show');
    document.getElementById('loading').classList.add('show');
    document.getElementById('btn').disabled = true;

    // Loading message cycle
    const messages = [
      'Fetching market data...',
      'Engineering features...',
      'Training model...',
      'Running predictions...',
      'Almost done...'
    ];
    let msgIndex = 0;
    document.getElementById('loadingMsg').textContent = messages[0];
    const msgInterval = setInterval(() => {
      msgIndex = (msgIndex + 1) % messages.length;
      document.getElementById('loadingMsg').textContent = messages[msgIndex];
    }, 6000);

    // Wait at least 30s before showing results
    const delay = new Promise(resolve => setTimeout(resolve, 30000));

    try {
      const [predRes, infoRes] = await Promise.all([
        fetch(`/predict/all?ticker=${ticker}`),
        fetch(`/info?ticker=${ticker}`),
        delay
      ]);
      clearInterval(msgInterval);

      if (!predRes.ok) {
        const e = await predRes.json();
        throw new Error(e.detail || 'Prediction failed');
      }

      const pred = await predRes.json();
      const info = infoRes.ok ? await infoRes.json() : null;

      document.getElementById('sName').textContent = info ? info.company_name : ticker;
      document.getElementById('sSub').textContent = [ticker, info?.sector, info?.industry].filter(Boolean).join(' · ');
      document.getElementById('sPrice').textContent = fmt(pred.current_price);

      // Predictions
      const predDiv = document.getElementById('predRows');
      predDiv.innerHTML = '';
      const predTips = {
        '1 Month':  'Short-term estimate scaled from the 1-year model. Less reliable — treat as a rough directional signal.',
        '6 Months': 'Medium-term estimate. More meaningful than 1 month but still uncertain.',
        '1 Year':   'The core ML prediction. Trained on 10 years of historical data using a Random Forest model.',
      };
      pred.predictions.forEach(p => {
        const up = p.expected_return_pct >= 0;
        const tip = predTips[p.horizon] || '';
        predDiv.innerHTML += `<div style="font-family:monospace;font-size:15px;margin-bottom:6px;"><span style="display:inline-block;width:90px;color:#888;"><span class="tip">${p.horizon}<span class="tiptext">${tip}</span></span>:</span> ${fmt(p.predicted_price)} <span style="color:${up ? '#1a7f37' : '#c00'}">${up ? '+' : ''}${p.expected_return_pct.toFixed(2)}%</span></div>`;
      });

      // Info
      const infoRow = document.getElementById('infoRow');
      infoRow.innerHTML = '';
      if (info) {
        const infoItems = [
          { lbl: 'Market Cap', val: fmtMcap(info.market_cap),
            tip: 'Total market value of the company. Large cap (>$10B) = more stable. Small cap = higher risk/reward.' },
          { lbl: 'P/E Ratio',  val: info.pe_ratio ? info.pe_ratio.toFixed(2) : 'N/A',
            tip: 'Price-to-Earnings. How much you pay per $1 of profit. S&P 500 avg ~25. High P/E = growth expected or overvalued.' },
          { lbl: '52W High',   val: fmt(info.fifty_two_week_high),
            tip: 'Highest price in the last year. If current price is far below this, the stock has pulled back significantly.' },
          { lbl: '52W Low',    val: fmt(info.fifty_two_week_low),
            tip: 'Lowest price in the last year. Price near this level may signal a buying opportunity — or ongoing trouble.' },
        ];
        infoItems.forEach(i => {
          infoRow.innerHTML += `<div class="info-item"><div class="lbl"><span class="tip">${i.lbl}<span class="tiptext">${i.tip}</span></span></div><div class="val">${i.val}</div></div>`;
        });
      }

      // ── Signal card ──────────────────────────────────────────────────────
      const yearPred = pred.predictions.find(p => p.horizon === '1 Year');
      const ret = yearPred ? yearPred.expected_return_pct : 0;
      const pe  = info ? info.pe_ratio : null;

      let signal = 'HOLD';
      let reason = '';

      if (ret > 8 && (pe === null || pe < 35)) {
        signal = 'BUY';
        reason = `Model predicts +${ret.toFixed(1)}% over 1 year${pe ? ` with a P/E of ${pe.toFixed(1)} — reasonably valued` : ''}.`;
      } else if (ret < -5 || (pe !== null && pe > 60)) {
        signal = 'SELL';
        reason = `Model predicts ${ret.toFixed(1)}% over 1 year${pe && pe > 60 ? ` and P/E of ${pe.toFixed(1)} suggests the stock may be overvalued` : ''}.`;
      } else {
        reason = `Model predicts +${ret.toFixed(1)}% — modest growth. ${pe ? `P/E of ${pe.toFixed(1)} is within normal range.` : ''} Monitor before acting.`;
      }

      const badge = document.getElementById('signalBadge');
      badge.textContent = signal;
      badge.className = 'signal-badge ' + signal.toLowerCase();
      document.getElementById('signalReason').textContent = reason;
      document.getElementById('signalCard').style.display = 'flex';

      // ── Related ETFs ─────────────────────────────────────────────────────
      const etfMap = {
        'AAPL': ['QQQ','SPY','VTI','XLK','IVV'],
        'MSFT': ['QQQ','SPY','VTI','XLK','IVV'],
        'GOOGL':['QQQ','SPY','XLC','VTI'],
        'AMZN': ['QQQ','SPY','XLY','VTI'],
        'NVDA': ['QQQ','SMH','SOXX','XLK','VTI'],
        'TSLA': ['QQQ','XLY','ARKK','VTI'],
        'META': ['QQQ','XLC','SPY','VTI'],
        'JPM':  ['XLF','VFH','SPY','KBE'],
        'SPY':  ['VOO','IVV','VTI'],
        'BRK-B':['XLF','VFH','SPY'],
        'AMD':  ['SMH','SOXX','QQQ','XLK'],
        'NFLX': ['QQQ','XLC','SPY'],
        'DIS':  ['XLC','SPY','VTI'],
      };
      const etfs = etfMap[curTicker] || ['SPY','QQQ','VTI'];
      const etfChips = document.getElementById('etfChips');
      etfChips.innerHTML = etfs.map(e =>
        `<button class="etf-chip" onclick="quickLook('${e}')">${e}</button>`
      ).join('');
      document.getElementById('etfSection').style.display = 'block';

      document.getElementById('loading').classList.remove('show');
      document.getElementById('result').classList.add('show');
      const addBtn = document.getElementById('addWatchBtn');
      addBtn.classList.add('visible');
      addBtn.textContent = '+ Add to Watchlist';
      addBtn.disabled = false;
      loadChart('1y');

    } catch (err) {
      clearInterval(msgInterval);
      document.getElementById('loading').classList.remove('show');
      document.getElementById('error').textContent = '⚠ ' + err.message;
      document.getElementById('error').classList.add('show');
    }

    document.getElementById('btn').disabled = false;
  }

  async function loadChart(period) {
    if (!curTicker) return;
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.textContent === period.replace('mo','M').replace('y','Y'))
    );
    try {
      const res = await fetch(`/history?ticker=${curTicker}&period=${period}`);
      if (!res.ok) return;
      const data = await res.json();
      if (chartInst) chartInst.destroy();
      const ctx = document.getElementById('chart').getContext('2d');
      chartInst = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.dates,
          datasets: [{
            data: data.prices,
            borderColor: '#4a9eff',
            borderWidth: 1.5,
            backgroundColor: 'rgba(74,158,255,0.08)',
            fill: true,
            pointRadius: 0,
            tension: 0.2,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#111',
              borderColor: '#333',
              borderWidth: 1,
              titleColor: '#666',
              bodyColor: '#fff',
              titleFont: { family: 'IBM Plex Mono', size: 11 },
              bodyFont: { family: 'IBM Plex Mono', size: 13, weight: '600' },
              callbacks: { label: item => ' $' + Number(item.raw).toFixed(2) }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#aaa', font: { family: 'IBM Plex Mono', size: 10 }, maxTicksLimit: 6 },
              border: { display: false }
            },
            y: {
              position: 'right',
              grid: { display: false },
              ticks: { color: '#aaa', font: { family: 'IBM Plex Mono', size: 10 }, callback: v => '$' + v.toFixed(0) },
              border: { display: false }
            }
          }
        }
      });
    } catch(e) { console.error(e); }
  }

  // ── Watchlist ──────────────────────────────────────────────────────────────
  function loadWatchlist() {
    try { return JSON.parse(localStorage.getItem('watchlist') || '[]'); }
    catch { return []; }
  }

  function saveWatchlist(list) {
    localStorage.setItem('watchlist', JSON.stringify(list));
  }

  function renderWatchlist() {
    const list = loadWatchlist();
    const el = document.getElementById('wlList');
    if (list.length === 0) {
      el.innerHTML = '<div class="wl-empty">No stocks added yet.</div>';
      return;
    }
    el.innerHTML = list.map((s, i) => `
      <div class="wl-item" onclick="quickLook('${s.ticker}')">
        <button class="wl-remove" onclick="event.stopPropagation(); removeFromWatchlist(${i})">✕</button>
        <div class="wl-ticker">${s.ticker}</div>
        <div class="wl-name">${s.name}</div>
        <div class="wl-price">${s.price}</div>
        <div class="wl-date">Added ${s.date}</div>
      </div>
    `).join('');
  }

  function addToWatchlist() {
    const ticker = curTicker;
    const name = document.getElementById('sName').textContent;
    const price = document.getElementById('sPrice').textContent;
    const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    const list = loadWatchlist();
    if (list.find(s => s.ticker === ticker)) {
      alert(ticker + ' is already in your watchlist.');
      return;
    }
    list.push({ ticker, name, price, date });
    saveWatchlist(list);
    renderWatchlist();
    document.getElementById('addWatchBtn').textContent = '✓ Added';
    document.getElementById('addWatchBtn').disabled = true;
  }

  function removeFromWatchlist(index) {
    const list = loadWatchlist();
    list.splice(index, 1);
    saveWatchlist(list);
    renderWatchlist();
  }

  // Show add button after results load
  const origRun = run;

  // Render watchlist on page load
  renderWatchlist();

</script>
</body>
</html>
